<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>B안 상하 2분할</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,"Noto Sans KR",sans-serif;}
body{background:#E9E8E2;padding:20px 12px;display:flex;flex-direction:column;align-items:center;}
.phone{width:100%;max-width:380px;height:720px;background:#F7F6F2;border:1px solid #D8D6CE;border-radius:22px;overflow:hidden;display:flex;flex-direction:column;}
.hd{display:flex;justify-content:space-between;align-items:center;padding:12px 14px 8px;flex-shrink:0;}
.hd b{font-size:15px;}.mode{font-size:11px;padding:3px 10px;border-radius:999px;background:rgba(15,118,110,.12);color:#0F766E;font-weight:600;}
.steps{display:flex;justify-content:space-between;padding:0 12px 8px;flex-shrink:0;}
.st{display:flex;flex-direction:column;align-items:center;gap:2px;}
.st .c{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;}
.st span{font-size:9px;color:#9A988F;}
.done .c{background:#0F766E;color:#fff;}.todo .c{border:1px solid #D8D6CE;color:#9A988F;background:#fff;}
.now .c{border:2px solid #0F766E;color:#0F766E;background:#fff;animation:pulse 1.6s ease-out infinite;}.now span{color:#0F766E;font-weight:600;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(15,118,110,.45);}50%{box-shadow:0 0 0 6px rgba(15,118,110,0);}}
.preview{flex:1 1 auto;overflow-y:auto;padding:4px 14px 12px;min-height:0;}
.pv-label{font-size:11px;color:#9A988F;margin-bottom:6px;display:flex;justify-content:space-between;}
.card{background:#fff;border:1px solid #E3E1DA;border-radius:14px;padding:14px;}
.card .vid{font-size:12px;color:#0F766E;font-weight:600;margin-bottom:8px;}.card h3{font-size:16px;margin-bottom:10px;}
.field{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-top:1px solid #F0EFE9;font-size:14px;}
.field .k{color:#6B6961;}.field .v{font-weight:600;}
.field .empty{color:#C4C2B9;border:1.5px dashed #D8D6CE;border-radius:7px;padding:3px 9px;font-size:12px;font-weight:400;}
.field.target .empty{border-color:#0F766E;color:#0F766E;}
.just-in{animation:pop .5s ease;}@keyframes pop{0%{background:#EAF4F2;}100%{background:transparent;}}
.lingo{flex:0 0 auto;background:#fff;border-top:1px solid #E3E1DA;box-shadow:0 -3px 12px rgba(0,0,0,.05);border-radius:18px 18px 0 0;}
.lhd{display:flex;align-items:center;gap:7px;padding:9px 14px;border-bottom:1px solid #F0EFE9;}
.badge{width:24px;height:24px;border-radius:50%;background:#0F766E;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;animation:pulse 1.6s ease-out infinite;}
.lhd b{font-size:13px;}.lhd .sub{font-size:11px;color:#9A988F;}
.spk{margin-left:auto;width:30px;height:30px;border-radius:50%;border:1px solid #E3E1DA;background:#FAFAF7;display:flex;align-items:center;justify-content:center;}
.spk svg{width:15px;height:15px;stroke:#9A988F;fill:none;stroke-width:2;}
.lbody{padding:10px 14px 6px;max-height:150px;overflow-y:auto;}
.bubble{background:#F7F6F2;border:1px solid #EEEDE7;border-radius:12px;border-top-left-radius:4px;padding:9px 11px;font-size:13.5px;line-height:1.5;max-width:92%;margin-bottom:8px;}
.bubble.me{background:#0F766E;color:#fff;margin-left:auto;border-radius:12px;border-top-right-radius:4px;max-width:80%;}
.chips{display:flex;gap:7px;margin-bottom:4px;flex-wrap:wrap;padding:0 14px;}
.chips button{font-size:12.5px;padding:7px 13px;border:1px solid #D8D6CE;background:#fff;border-radius:999px;cursor:pointer;}
.chips button.go{background:#0F766E;color:#fff;border-color:#0F766E;}
.input-row{display:flex;align-items:center;gap:9px;padding:8px 14px 12px;}
.txt{flex:1;border:1px solid #E3E1DA;border-radius:12px;padding:10px 11px;font-size:12.5px;color:#9A988F;background:#FAFAF7;}
.rail{position:relative;width:96px;height:50px;border-radius:999px;background:#EFEEE8;border:1px solid #E3E1DA;flex-shrink:0;}
.rail .lab{position:absolute;top:50%;transform:translateY(-50%);font-size:11px;font-weight:700;color:#B5B3AA;left:12px;}
.rail.on{background:#0F766E33;}.rail.on .lab{color:#0F766E;left:auto;right:12px;}
.knob{position:absolute;top:2px;right:2px;width:44px;height:44px;border-radius:50%;background:#0F766E;display:flex;align-items:center;justify-content:center;transition:right .18s;}
.rail.on .knob{right:50px;}.knob svg{width:20px;height:20px;fill:#fff;}
</style></head><body>
<div class="phone">
<div class="hd"><b>카드 스튜디오</b><span class="mode">상품판매</span></div>
<div class="steps">
<div class="st done"><div class="c">✓</div><span>사진</span></div>
<div class="st done"><div class="c">✓</div><span>상품명</span></div>
<div class="st now" id="s3"><div class="c">3</div><span>원산지</span></div>
<div class="st todo" id="s4"><div class="c">4</div><span>가격</span></div>
<div class="st todo" id="s5"><div class="c">5</div><span>수량</span></div>
<div class="st todo"><div class="c">6</div><span>발송</span></div>
<div class="st todo"><div class="c">7</div><span>발행</span></div>
</div>
<div class="preview">
<div class="pv-label"><span>실시간 미리보기</span><span>보이는 그대로 공유돼요</span></div>
<div class="card">
<div class="vid">▶ 수확 영상 장착됨</div>
<h3>오늘 새벽에 딴 초당옥수수예요</h3>
<div class="field"><span class="k">원산지</span><span id="f-origin" class="empty target">③ 여기 붙어요</span></div>
<div class="field"><span class="k">가격</span><span id="f-price" class="empty">미정</span></div>
<div class="field"><span class="k">수량</span><span id="f-qty" class="empty">미정</span></div>
</div>
</div>
<div class="lingo">
<div class="lhd"><span class="badge" id="lbadge">3</span><b>링고AI</b><span class="sub" id="lsub">지금 3번 · 원산지</span>
<button class="spk"><svg viewBox="0 0 24 24"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15.5 8.5a5 5 0 010 7"/></svg></button></div>
<div class="lbody" id="lbody"><div class="bubble" id="q">3번, 원산지는 어디로 할까요? 말씀만 하시면 바로 붙일게요.</div></div>
<div class="chips" id="chips"><button class="go" onclick="step()">충북 괴산 · 적용</button></div>
<div class="input-row"><div class="txt">글로 입력하기…</div>
<div class="rail"><span class="lab">OFF</span><div class="knob"><svg viewBox="0 0 24 24"><path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 1 0-6 0v5a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/></svg></div></div></div>
</div></div>
<script>
var seq=[{field:'f-origin',val:'충북 괴산',me:'충북 괴산이야',s:'s3',next:4,nextName:'가격',q:'좋아요, 붙였어요! 4번 가격은 얼마로 할까요?',chip:'15,000원 · 적용',ntarget:'f-price'},
{field:'f-price',val:'15,000원',me:'만 오천원',s:'s4',next:5,nextName:'수량',q:'적용했어요. 5번, 몇 박스 판매하세요?',chip:'38박스 · 적용',ntarget:'f-qty'},
{field:'f-qty',val:'38박스',me:'38박스',s:'s5',next:null,nextName:null,q:'다 됐어요! 옥수수 / 15,000원 / 괴산 / 38박스 — 이대로 발행할까요? 발행 버튼은 직접 눌러 주세요.',chip:null}];
var i=0;
function step(){var cur=seq[i];var body=document.getElementById('lbody');
var me=document.createElement('div');me.className='bubble me';me.textContent=cur.me;body.appendChild(me);
var f=document.getElementById(cur.field);f.className='';f.textContent=cur.val;f.classList.add('just-in');
var s=document.getElementById(cur.s);s.className='st done';s.querySelector('.c').textContent='✓';
if(cur.ntarget){var nt=document.getElementById(cur.ntarget);nt.className='empty target';}
if(cur.next){var ns=document.getElementById('s'+cur.next);if(ns){ns.className='st now';}
document.getElementById('lbadge').textContent=cur.next;document.getElementById('lsub').textContent='지금 '+cur.next+'번 · '+cur.nextName;}
else{document.getElementById('lbadge').textContent='✓';document.getElementById('lbadge').style.animation='none';document.getElementById('lsub').textContent='완성';}
setTimeout(function(){var q=document.createElement('div');q.className='bubble';q.textContent=cur.q;body.appendChild(q);body.scrollTop=body.scrollHeight;
var chips=document.getElementById('chips');chips.innerHTML='';
if(cur.chip){var b=document.createElement('button');b.className='go';b.textContent=cur.chip;b.onclick=step;chips.appendChild(b);}
else{var b=document.createElement('button');b.textContent='처음부터 다시';b.onclick=function(){location.reload();};chips.appendChild(b);}},350);
body.scrollTop=body.scrollHeight;i++;}
</script></body></html>
